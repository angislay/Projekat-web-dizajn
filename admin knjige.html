<!DOCTYPE html>
<html lang="sr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="kostur_css.css">
    <link rel="stylesheet" href="admin knjige.css">
    <title>Админ - Управљање књигама</title>
</head>
<body>
    <header>
        <!-- Твоја стандардна навигација из kostur_css.css -->
          <nav class="navbar">

    <div class="nav-left">
        <button class="login-btn">Пријава</button>
         <ul class="nav-links">
        <li><a href="katalog knjiga.html">Почетна</a></li>
        <li><a href="autori.html">Аутори</a></li>
        <li><a href="profil.html">Профил</a></li>
        <li><a href="admin knjige.html">Админ књиге</a></li>
        <li><a href="admin_autori.html">Админ аутора</a></li>
    </ul>
    </div>

   

    <div class="nav-right">
        <button class="hamburger_dugme">☰</button>
        <div class="logo">📚 Књижевни кутак</div>
    </div>

</nav>
    </header>

    <main>
        <section class="admin-header">
            <h2>Управљање књигама</h2>
            <button class="login-btn" onclick="otvoriFormu('dodaj')">+ Додај нову књигу</button>
        </section>

        <!-- Табела књига -->
        <div class="tabela-kontejner">
            <table>
                <thead>
                    <tr>
                        <th>Наслов</th>
                        <th>Аутор</th>
                        <th>Жанр</th>
                        <th>Година</th>
                        <th>Акције</th>
                    </tr>
                </thead>
                <tbody>
                    <tr>
                        <td>На Дрини ћуприја</td>
                        <td>Иво Андрић</td>
                        <td>Роман</td>
                        <td>1945</td>
                        <td>
                            <button class="btn-izmeni" onclick="popuniFormuKnjiga('На Дрини ћуприја', 'Иво Андрић', 'Роман', 1945, '978-86...')">Измени</button>
                            <button class="btn-obrisi">Обриши</button>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>

        <!-- Форма за Књиге (скривена) -->
        <div id="forma-knjiga-sekcija" class="forma-kontejner" style="display:none;">
            <hr>
            <h3 id="knjiga-naslov-forme">Додавање књиге</h3>
            <form id="knjiga-forma">
                <div class="input-grupa">
                    <label>Наслов књиге:</label>
                    <input type="text" id="naslov_knjige" required>
                </div>
                
                <div class="input-grupa">
                    <label>Аутор:</label>
                    <select id="autor_knjige">
                        <option value="Ivo Andric">Иво Андрић</option>
                        <option value="Mesa Selimovic">Меша Селимовић</option>
                    </select>
                </div>

                <div class="input-grupa">
                    <label>Жанр:</label>
                    <input type="text" id="zanr_knjige">
                </div>

                <div class="input-grupa">
                    <label>Година издања:</label>
                    <input type="number" id="godina_knjige">
                </div>

                <div class="form-dugmad">
                    <button type="submit" class="login-btn">Сачувај измене</button>
                    <button type="button" class="btn-obrisi" onclick="zatvoriFormu()">Откажи</button>
                </div>
            </form>
        </div>
    </main>
</body>
</html>

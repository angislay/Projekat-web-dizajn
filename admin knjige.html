<!DOCTYPE html>
<html lang="sr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="kostur_css.css">
    <link rel="stylesheet" href="admin knjige.css">
    <title>Админ - Управљање књигама</title>
</head>
<body>
    <header>
        <nav class="navbar">
            <div class="nav-left">
                <button class="login-btn">Пријава</button>
                <ul class="nav-links">
                    <li><a href="katalog knjiga.html">Почетна</a></li>
                    <li><a href="autori.html">Аутори</a></li>
                    <li><a href="profil.html">Профил</a></li>
                    <li><a href="admin knjige.html">Админ књиге</a></li>
                    <li><a href="admin_autori.html">Админ аутора</a></li>
                </ul>
            </div>
            <div class="nav-right">
                <button class="hamburger_dugme">☰</button>
                <div class="logo">📚 Књижевни кутак</div>
            </div>
        </nav>
    </header>

    <main>
        <section class="admin-header">
            <h2>Управљање књигама</h2>
            <button class="login-btn" onclick="otvoriFormu('dodaj')">+ Додај нову књигу</button>
        </section>

        <!-- Табела књига -->
        <div class="tabela-kontejner">
            <table>
                <thead>
                    <tr>
                        <th>Наслов</th>
                        <th>Аутор</th>
                        <th>Жанр</th>
                        <th>Цена</th>
                        <th>ISBN</th>
                        <th>Акције</th>
                    </tr>
                </thead>
                <tbody id="tabela-telo">
                    <tr>
                        <td colspan="6" style="text-align:center;">Учитавање...</td>
                    </tr>
                </tbody>
            </table>
        </div>

        <!-- Форма за Књиге (скривена) -->
        <div id="forma-knjiga-sekcija" class="forma-kontejner" style="display:none;">
            <hr>
            <h3 id="knjiga-naslov-forme">Додавање књиге</h3>
            <form id="knjiga-forma" onsubmit="return false;">

                <div class="input-grupa">
                    <label>Наслов књиге: <span class="greska" id="gr-naslov"></span></label>
                    <input type="text" id="naslov_knjige" placeholder="нпр. На Дрини ћуприја">
                </div>

                <div class="input-grupa">
                    <label>Аутор:</label>
                    <select id="autor_knjige"></select>
                </div>

                <div class="input-grupa">
                    <label>Опис:</label>
                    <textarea id="opis_knjige" rows="3" placeholder="Кратак опис књиге..."></textarea>
                </div>

                <div class="input-grupa">
                    <label>Жанр: <span class="greska" id="gr-zanr"></span></label>
                    <input type="text" id="zanr_knjige" placeholder="нпр. Класика">
                </div>

                <div class="input-grupa">
                    <label>Формат:</label>
                    <select id="format_knjige">
                        <option value="Меки повез">Меки повез</option>
                        <option value="Тврди повез">Тврди повез</option>
                        <option value="еКњига">еКњига</option>
                    </select>
                </div>

                <div class="input-grupa">
                    <label>Цена (РСД): <span class="greska" id="gr-cena"></span></label>
                    <input type="number" id="cena_knjige" placeholder="нпр. 1500" min="0">
                </div>

                <div class="input-grupa">
                    <label>Број страна: <span class="greska" id="gr-strane"></span></label>
                    <input type="number" id="strane_knjige" placeholder="нпр. 320" min="1">
                </div>

                <div class="input-grupa">
                    <label>ISBN: <span class="greska" id="gr-isbn"></span></label>
                    <input type="text" id="isbn_knjige" placeholder="нпр. 978-86-7543-123-4">
                </div>

                <div class="input-grupa">
                    <label>URL слика (одвојити зарезом):</label>
                    <textarea id="slike_knjige" rows="2" placeholder="https://example.com/slika1.jpg, https://..."></textarea>
                </div>

                <div class="form-dugmad">
                    <button type="button" class="login-btn" onclick="sacuvajKnjigu()">Сачувај</button>
                    <button type="button" class="btn-obrisi" onclick="zatvoriFormu()">Откажи</button>
                </div>
            </form>
        </div>
    </main>

    <!-- Кастом дијалог за брисање -->
    <div id="dijalog-brisanje" class="dijalog-pozadina" style="display:none;">
        <div class="dijalog-prozor">
            <h3>Потврда брисања</h3>
            <p>Да ли сте сигурни да желите да обришете књигу <strong id="dijalog-naziv"></strong>?</p>
            <div class="dijalog-dugmad">
                <button class="btn-obrisi" onclick="potvrdiObrisanje()">Обриши</button>
                <button class="login-btn" onclick="zatvoriDijalog()">Откажи</button>
            </div>
        </div>
    </div>

</body>
<script src="ang_js/admin knjige.js"></script>
<script src="ang_js/responsiviti.js"></script>
</html>

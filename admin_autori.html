<html lang="en">
<head>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">

    <link rel="stylesheet" href="vik_css/sve.css">
    <link rel="stylesheet" href="vik_css/admin_autori.css">   
 
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- <meta name="viewport" content="width=device-width, initial-scale=1.0">
     -->
    <!-- pronasla na netu ovo, vezano za poresavanje stranice
     zavisno od sirine prozora, mozda kasnije zatreba -->
    <title>Админ: Аутори</title>
</head>
<body>
    <header>
        <nav>
            <div class="levo">
                
                <button>Пријава</button>
                    <div class="hamburger">
                    <button id="hamburger_dugme" onclick="padajuci_meni()">meni</button>
                
                <div class="padajuci_meni">
                    <ul>
                        <li><a href="katalog knjiga.html">Почетна</a></li>
                        <li><a href="autori.html">Аутори</a></li>
                        <li><a href="profil.html">Профил</a></li>
                        <li><a href="admin knjige.html">Админ књиге</a></li>
                        <li><a href="admin_autori.html">Админ аутора</a></li>
                    </ul> 
                </div>
                </div>
            </div>    
            <div class="desno"></div> 
        </nav>
    </header>

    <main>
        <h3>Листа Аутора:</h3>
        <button style="margin-bottom: 1rem;" onclick="forma_novi_autor()">Нови аутор</button>
        <section id="lista">
            <div class="element">
                <!-- <a href="autor.html"><strong>Иво Андрић</strong></a>
                 -->
                Учитавање...
                <!-- <div class="dugmad">
                    <button onclick="pop_up()">Измени</button>
                    <button id="brisanje">Обриши</button>
                </div> -->
            </div>
        </section>
    </main>
    <div class="izmjena">
        <form action="" id="izmjena" >
            <h3>Измена података:</h3>
            <div class="kontejner">
                <div class="poruka">
                    <div class="unos">
                        <label for="unos_ime">Име:</label>
                        <input type="text" id="unos_ime" placeholder="Учитавање">
                    </div>
                    <span id="poruka_ime"></span>
                </div>

                <div class="poruka">
                    <div class="unos">
                        <label for="unos_prezime">Презиме:</label>
                        <input type="text" id="unos_prezime" placeholder="Учитавање">
                    </div>
                    <span id="poruka_prezime"></span>
                </div>

                <div class="poruka">
                    <div class="unos">
                        <label for="unos_status">Статус:</label>
                        <input type="text" id="unos_status" placeholder="Учитавање">
                    </div>
                    <span id="poruka_status"></span>
                </div>

                <div class="poruka">
                    <div class="unos">
                        <label for="unos_datum">Датум рођења:</label>
                        <input type="date" id="unos_datum" placeholder="">
                    </div>
                    <span id="poruka_datum"></span>
                </div>

                <div class="poruka">
                    <div class="unos">
                        <label for="unos_nagrade">Број освојених награда:</label>
                        <input type="number" id="unos_nagrade" placeholder="0">
                    </div>
                    <span id="poruka_nagrade"></span>
                </div>

                <div class="poruka">
                    <div class="unos">
                        <label for="unos_primjerci">Број продатих примерака:</label>
                        <input type="number" id="unos_primjerci" placeholder="0">
                    </div>
                    <span id="poruka_primjerci"></span>
                </div>

                <div class="poruka">
                    <div class="unos">
                        <label for="unos_kontakt">Контакт:</label>
                        <input type="text" id="unos_kontakt" placeholder="Учитавање">
                    </div>
                    <span id="poruka_kontakt"></span>
                </div>

                <div class="poruka">
                    <div class="unos">
                        <label for="unos_bio">Биографија:</label>
                        <textarea id="unos_bio" rows="3" placeholder="Учитавање"></textarea>
                    </div>
                    <span id="poruka_bio"></span>
                </div>

                <div class="poruka">
                    <div class="unos">
                        <label for="unos_slike">Листе URL-ова слика (одвојити зарезом , ):</label>
                        <textarea id="unos_slike" rows="3" placeholder="Учитавање"></textarea>
                    </div>
                    <span id="poruka_slike"></span>
                </div>
                <div class="unos">
                    <input type="submit">
                    <button onclick="pop_up()">Одустани</button>
                </div>
            </div>
        </form>
    </div>
    <div class="izmjena" id="prozor_brisanje">
    <div class="bris">
        <h3>Да ли сте сигурни да желите да обришете овог аутора?</h3>
        <p style="color: red; margin-bottom: 1.5rem;">Ова акција је трајна и не може се поништити.</p>
        <div class="unos">
            <button id="potvrdi_brisanje_dugme" style="background-color: #d9534f; color: white;">Обриши</button>
            <button onclick="zatvori_prozor_brisanje()">Одустани</button>
        </div>
    </div>
</div>
</body>
<script src="vik_js/sve.js"></script>
<script src="vik_js/admin_autori.js"></script>
</html>

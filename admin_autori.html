        </section>
    </main>
    <div class="izmjena">
        <form action="">
            <h3>Измена података:</h3>
            <div class="kontejner">
                <div class="unos">
                    <label for="">Име:</label>
                    <input type="text" id="unos_ime" placeholder="Иво">
                </div>
                <div class="unos">
                    <label for="">Презиме:</label>
                    <input type="text" id="unos_prezime" placeholder="Андрић">
                </div>
                <div class="unos">
                    <label for="">Статус:</label>
                    <input type="text" id="unos_status" placeholder="Преминуо">
                </div>
                <div class="unos">
                    <label for="">Датум рођења:</label>
                    <input type="date" id="unos_datum" placeholder="">
                </div>
                <div class="unos">
                    <label for="">Број освојених награда:</label>
                    <input type="number" id="unos_nagrade" placeholder="">
                </div>
                <div class="unos">
                    <label for="">Број продатих примерака:</label>
                    <input type="number" id="unos_primjerci" placeholder="">
                </div>
                <div class="unos">
                    <label for="">Контакт:</label>
                    <input type="text" id="unos_kontakt" placeholder="987978">
                </div>
                <div class="unos">
                    <label>Биографија:</label>
                    <textarea id="unos_bio" rows="3" placeholder="Учитавање"></textarea>
                </div>
                <div class="unos">
                    <label>Листе URL-ова слика (одвојити зарезом , ):</label>
                    <textarea id="unos_slike" rows="3" placeholder="https://example.com/slika1.jpg&#10;https://example.com/slika2.jpg"></textarea>
                </div>
                <div class="unos">
                    <button onclick="pop_up()">Сачувај</button>
                    <button onclick="pop_up()">Одустани</button>
                </div>
            </div>
        </form>
    </div>
